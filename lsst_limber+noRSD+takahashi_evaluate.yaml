timing: True
debug: False
stop_at_error: False

likelihood:
  lsst_fourier.combo_3x2pt:
    path: ./projects/lsst_fourier/data
    data_file: lsst_evaluate.dataset
    accuracyboost: 1.0      
    integration_accuracy: 0
    kmax_boltzmann: 7.5
    # 1 EE2, 2 Halofit
    non_linear_emul: 2
    IA_model: 0
    IA_redshift_evolution: 3
    ggl_exclude: []

    print_datavector: True
    print_datavector_file: ./projects/lsst_fourier/chains/lsst_limber+noRSD+takahashi_evaluate/lsst_limber+noRSD+takahashi.modelvector

    adopt_limber_gg: 1
    adopt_limber_gs: 1
    adopt_RSD_gg: 0
    adopt_RSD_gs: 0
    NCell_interpolation: 300 #base:300
    Na_interpolation: 225 #base:225
    
